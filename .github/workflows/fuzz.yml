name: Parser fuzz campaign

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  parser-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo and fuzz build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-fuzz
            fuzz/target
          key: ${{ runner.os }}-parser-fuzz-${{ hashFiles('Cargo.lock', 'fuzz/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-parser-fuzz-

      - name: Install cargo-fuzz
        run: command -v cargo-fuzz >/dev/null || cargo install cargo-fuzz --locked

      - name: Run five-minute parser campaign
        run: >-
          cargo +nightly fuzz run parser --
          -max_total_time=300
          -timeout=5
          -rss_limit_mb=2048
          -print_final_stats=1

      - name: Upload parser crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: parser-fuzz-crashers
          path: fuzz/artifacts/parser
          if-no-files-found: ignore
